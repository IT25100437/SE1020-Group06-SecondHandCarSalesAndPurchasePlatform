server.port=8080
app.data.users-file=src/main/resources/data/users.txt
app.data.vehicles-file=src/main/resources/data/vehicles.txt
app.data.bookings-file=src/main/resources/data/bookings.txt
app.data.transactions-file=src/main/resources/data/transactions.txt
app.data.payments-file=src/main/resources/data/payments.txt
app.data.reviews-file=src/main/resources/data/reviews.txt
app.data.sellers-file=src/main/resources/data/sellers.txt
app.data.admins-file=src/main/resources/data/admins.txt
spring.web.resources.static-locations=classpath:/static/
# Fix auto-logout: extend session to 8 hours
server.servlet.session.timeout=28800s
# Fix CORS / cookie issues
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
